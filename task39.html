<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Slider</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.slider{
    width:800px;
    max-width:90%;
    position:relative;
    overflow:hidden;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.slide{
    display:none;
    width:100%;
}

.slide img{
    width:100%;
    height:450px;
    object-fit:cover;
}

.active{
    display:block;
}

/* Previous & Next Buttons */
.prev,
.next{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:rgba(0,0,0,0.5);
    color:white;
    border:none;
    font-size:24px;
    padding:15px;
    cursor:pointer;
    border-radius:50%;
}

.prev{
    left:15px;
}

.next{
    right:15px;
}

.prev:hover,
.next:hover{
    background:rgba(0,0,0,0.8);
}

/* Dots */
.dots{
    text-align:center;
    position:absolute;
    bottom:15px;
    width:100%;
}

.dot{
    height:15px;
    width:15px;
    margin:0 5px;
    display:inline-block;
    background:#bbb;
    border-radius:50%;
    cursor:pointer;
}

.dot.active-dot{
    background:white;
}

@media(max-width:768px){
    .slide img{
        height:250px;
    }
}
</style>
</head>

<body>

<div class="slider">

    <div class="slide active">
        <img src="https://picsum.photos/id/1015/900/500" alt="Image 1">
    </div>

    <div class="slide">
        <img src="https://picsum.photos/id/1025/900/500" alt="Image 2">
    </div>

    <div class="slide">
        <img src="https://picsum.photos/id/1035/900/500" alt="Image 3">
    </div>

    <div class="slide">
        <img src="https://picsum.photos/id/1045/900/500" alt="Image 4">
    </div>

    <button class="prev" onclick="changeSlide(-1)">❮</button>
    <button class="next" onclick="changeSlide(1)">❯</button>

    <div class="dots">
        <span class="dot active-dot" onclick="currentSlide(0)"></span>
        <span class="dot" onclick="currentSlide(1)"></span>
        <span class="dot" onclick="currentSlide(2)"></span>
        <span class="dot" onclick="currentSlide(3)"></span>
    </div>

</div>

<script>
let slideIndex = 0;

const slides = document.querySelectorAll(".slide");
const dots = document.querySelectorAll(".dot");

function showSlide(index){

    if(index >= slides.length){
        slideIndex = 0;
    }

    if(index < 0){
        slideIndex = slides.length - 1;
    }

    slides.forEach(slide => {
        slide.classList.remove("active");
    });

    dots.forEach(dot => {
        dot.classList.remove("active-dot");
    });

    slides[slideIndex].classList.add("active");
    dots[slideIndex].classList.add("active-dot");
}

function changeSlide(n){
    slideIndex += n;
    showSlide(slideIndex);
}

function currentSlide(n){
    slideIndex = n;
    showSlide(slideIndex);
}

/* Auto Slide */
setInterval(() => {
    slideIndex++;
    showSlide(slideIndex);
}, 3000);
</script>

</body>
</html>
